<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Luminara Glass</title>
<meta name="description" content="Handcrafted glass artwork by Luminara.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
.product-page { margin-top:80px; padding:60px; min-height:100vh; }
.product-detail { display:grid; grid-template-columns:1fr 1fr; gap:80px; margin-bottom:100px; align-items:start; }
.product-image-area { position:sticky; top:100px; }
.product-visual { background:var(--dark2); border:1px solid rgba(255,255,255,0.06); aspect-ratio:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.product-visual::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 30% 30%, rgba(168,200,232,0.1) 0%, transparent 60%), radial-gradient(ellipse at 70% 70%, rgba(201,169,110,0.06) 0%, transparent 60%); }
.product-visual::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%, rgba(201,169,110,0.04) 100%); animation:shimmerProduct 4s ease-in-out infinite alternate; }
@keyframes shimmerProduct { 0%{opacity:0.3;transform:translateX(-10px)} 100%{opacity:1;transform:translateX(10px)} }
.product-big-icon { font-size:8rem; position:relative; z-index:1; filter:drop-shadow(0 0 40px rgba(168,200,232,0.4)); animation:iconFloat 6s ease-in-out infinite; }
@keyframes iconFloat { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
.product-info { }
.product-cat-tag { display:inline-block; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); background:rgba(201,169,110,0.08); border:1px solid rgba(201,169,110,0.2); padding:4px 12px; margin-bottom:20px; text-decoration:none; transition:all 0.3s; }
.product-cat-tag:hover { background:rgba(201,169,110,0.15); }
.product-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3.5rem); font-weight:300; line-height:1.1; margin-bottom:20px; }
.product-rating-row { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.stars { color:var(--gold); font-size:1.1rem; letter-spacing:2px; }
.rating-count { font-size:0.78rem; color:var(--muted); }
.product-price-row { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
.product-current-price { font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:300; color:var(--gold-light); }
.product-compare-price { font-size:1.4rem; text-decoration:line-through; color:var(--muted); font-family:'Cormorant Garamond',serif; }
.discount-badge { background:rgba(201,169,110,0.15); color:var(--gold); font-size:0.72rem; font-weight:500; padding:4px 12px; border-radius:2px; letter-spacing:0.1em; }
.product-short-desc { font-size:0.9rem; line-height:1.8; color:var(--muted); margin-bottom:28px; }
.qty-row { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
.qty-label { font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }
.qty-control { display:flex; align-items:center; border:1px solid rgba(255,255,255,0.1); }
.qty-btn-large { width:44px; height:44px; background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:none; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.qty-btn-large:hover { background:rgba(255,255,255,0.05); color:var(--gold); }
.qty-num { width:48px; text-align:center; font-size:0.95rem; background:transparent; border:none; border-left:1px solid rgba(255,255,255,0.1); border-right:1px solid rgba(255,255,255,0.1); color:var(--text); font-family:'Jost',sans-serif; padding:0; height:44px; outline:none; }
.add-cart-large { width:100%; padding:18px; font-size:0.8rem; letter-spacing:0.25em; margin-bottom:16px; position:relative; overflow:hidden; background:transparent; border:1px solid rgba(201,169,110,0.3); color:var(--gold-light); font-family:'Jost',sans-serif; text-transform:uppercase; cursor:none; transition:all 0.4s; }
.add-cart-large::before { content:''; position:absolute; inset:0; background:var(--gold); transform:translateX(-100%); transition:transform 0.4s; z-index:-1; }
.add-cart-large:hover { color:var(--dark); border-color:var(--gold); }
.add-cart-large:hover::before { transform:translateX(0); }
.add-cart-large.success { background:var(--gold); color:var(--dark); border-color:var(--gold); }
.add-cart-large span { position:relative; z-index:1; }
.specs-table { width:100%; border-collapse:collapse; margin-top:16px; }
.specs-table tr { border-bottom:1px solid rgba(255,255,255,0.04); }
.specs-table td { padding:12px 0; font-size:0.82rem; }
.specs-table td:first-child { color:var(--muted); width:40%; }
.specs-table td:last-child { color:var(--text); }
.tags-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; }
.tag-pill { font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); padding:4px 12px; border-radius:2px; }
.section-divider { height:1px; background:linear-gradient(to right,transparent,rgba(201,169,110,0.2),transparent); margin:60px 0; }
.full-desc { max-width:720px; }
.full-desc h3 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; margin-bottom:24px; }
.full-desc p { font-size:0.88rem; line-height:1.9; color:var(--muted); margin-bottom:16px; }
/* Reviews */
.reviews-section { margin-top:60px; }
.reviews-section h3 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; margin-bottom:32px; }
.review-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.04); padding:28px; margin-bottom:16px; }
.review-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.reviewer-name { font-size:0.88rem; color:var(--text); }
.review-date { font-size:0.72rem; color:var(--muted); }
.review-stars { color:var(--gold); font-size:0.9rem; margin-bottom:12px; }
.review-text { font-size:0.85rem; line-height:1.7; color:var(--muted); }
.write-review { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); padding:32px; margin-top:32px; }
.write-review h4 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300; margin-bottom:24px; cursor:none; display:flex; align-items:center; gap:12px; }
.star-picker { display:flex; gap:6px; margin-bottom:20px; }
.star-pick { font-size:1.5rem; color:rgba(201,169,110,0.3); cursor:none; transition:color 0.2s; }
.star-pick.active { color:var(--gold); }
.related-section { margin-top:80px; }
.related-section h3 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; margin-bottom:40px; }

@media(max-width:900px){
  .product-page { padding:32px 24px; }
  .product-detail { grid-template-columns:1fr; gap:40px; }
  .product-image-area { position:static; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="nav-logo">Luminara <span>Glass</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/shop">Shop</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button class="cart-btn" aria-label="Open cart">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="product-page" id="productPage">
  <!-- Skeleton while loading -->
  <div id="productSkeleton">
    <div class="skeleton skeleton-line" style="height:14px;width:300px;margin-bottom:40px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:80px">
      <div class="skeleton skeleton-card" style="aspect-ratio:1;height:auto"></div>
      <div>
        <div class="skeleton skeleton-line" style="height:12px;width:80px;margin-bottom:20px"></div>
        <div class="skeleton skeleton-line" style="height:40px;width:100%;margin-bottom:16px"></div>
        <div class="skeleton skeleton-line" style="height:40px;width:70%;margin-bottom:32px"></div>
        <div class="skeleton skeleton-line" style="height:18px;width:150px;margin-bottom:24px"></div>
        <div class="skeleton skeleton-line" style="height:12px;width:100%;margin-bottom:10px"></div>
        <div class="skeleton skeleton-line" style="height:12px;width:90%;margin-bottom:10px"></div>
        <div class="skeleton skeleton-line" style="height:12px;width:80%;margin-bottom:40px"></div>
        <div class="skeleton skeleton-card" style="height:56px;margin-bottom:16px"></div>
      </div>
    </div>
  </div>
  <div id="productContent" style="display:none"></div>
</div>

<footer class="site-footer">
  <div class="footer-grid">
    <div class="footer-brand">
      <a href="/" class="footer-logo">Luminara <span style="font-style:italic;color:var(--gold)">Glass</span></a>
      <p>Master artisans of glass since 2010.</p>
    </div>
    <div class="footer-col"><h4>Quick Links</h4><ul><li><a href="/">Home</a></li><li><a href="/shop">Shop</a></li><li><a href="/about">About</a></li><li><a href="/contact">Contact</a></li></ul></div>
    <div class="footer-col"><h4>Help</h4><ul><li><a href="/track">Track Order</a></li><li><a href="/returns">Shipping &amp; Returns</a></li></ul></div>
    <div class="footer-newsletter footer-col"><h4>Newsletter</h4><form class="newsletter-form" action="#" style="flex-direction:column;gap:0"><input type="email" placeholder="your@email.com" required style="margin-bottom:8px"><button type="submit" style="width:100%">Subscribe</button></form></div>
  </div>
  <div class="footer-bottom"><span>© 2025 Luminara Glass. All rights reserved.</span></div>
</footer>

<script src="/js/shared.js"></script>
<script>
const slug = new URLSearchParams(window.location.search).get('slug');
let selectedQty = 1;
let selectedRating = 0;
let productData = null;

if (!slug) {
  window.location.href = '/shop';
}

function renderStars(rating, max) {
  max = max || 5;
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(max - full);
}

async function loadProduct() {
  try {
    const [prodRes, revRes] = await Promise.all([
      fetch('/api/products/' + slug),
      fetch('/api/products/' + slug + '/reviews')
    ]);
    const prodData = await prodRes.json();
    const revData = await revRes.json();

    if (!prodData.data) {
      document.getElementById('productPage').innerHTML = '<div style="text-align:center;padding:120px 40px"><p style="color:var(--muted)">Product not found.</p><a href="/shop" class="btn-primary" style="margin-top:24px;display:inline-block">Back to Shop</a></div>';
      return;
    }

    productData = prodData.data;
    const p = productData;
    const reviews = revData.data || [];

    document.title = p.name + ' \u2014 Luminara Glass';

    // Breadcrumb
    const breadcrumb =
      '<div class="breadcrumb fade-in">' +
        '<a href="/">Home</a><span>›</span>' +
        '<a href="/shop">Shop</a><span>›</span>' +
        '<a href="/shop?category=' + p.category_slug + '">' + (p.category_name || 'Collection') + '</a><span>›</span>' +
        '<span>' + p.name + '</span>' +
      '</div>';

    // Discount
    const discountPct = (p.compare_at_price && p.compare_at_price > p.price)
      ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0;

    // Specs
    let specsHTML = '';
    if (p.specifications && Object.keys(p.specifications).length) {
      specsHTML =
        '<div class="section-divider"></div>' +
        '<h4 style="font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:16px">Specifications</h4>' +
        '<table class="specs-table">' +
        Object.entries(p.specifications).map(function(entry) {
          return '<tr><td>' + entry[0] + '</td><td>' + entry[1] + '</td></tr>';
        }).join('') +
        '</table>';
    }

    // Tags
    const tagsHTML = (p.tags && p.tags.length)
      ? '<div class="tags-row">' + p.tags.map(function(t) { return '<span class="tag-pill">' + t + '</span>'; }).join('') + '</div>'
      : '';

    // Stock
    const stockClass = p.stock_qty > 5 ? 'stock-in' : p.stock_qty > 0 ? 'stock-low' : 'stock-out';
    const stockLabel = p.stock_qty > 5 ? 'In Stock' : p.stock_qty > 0 ? 'Only ' + p.stock_qty + ' left' : 'Out of Stock';

    // Reviews
    const reviewsHTML = reviews.length
      ? reviews.map(function(r) {
          return '<div class="review-card fade-up">' +
            '<div class="review-header">' +
              '<span class="reviewer-name">' + r.reviewer_name + '</span>' +
              '<span class="review-date">' + new Date(r.created_at).toLocaleDateString('en-IN', {year:'numeric',month:'short',day:'numeric'}) + '</span>' +
            '</div>' +
            '<div class="review-stars">' + renderStars(r.rating) + '</div>' +
            '<p class="review-text">' + r.review_text + '</p>' +
          '</div>';
        }).join('')
      : '<p style="color:var(--muted);font-size:0.88rem;padding:20px 0">No reviews yet. Be the first to share your experience.</p>';

    const maxQty = Math.min(p.stock_qty, 10);

    const qtyHTML = p.stock_qty > 0
      ? '<div class="qty-row fade-up">' +
          '<span class="qty-label">Qty</span>' +
          '<div class="qty-control">' +
            '<button class="qty-btn-large" id="qtyDec">\u2212</button>' +
            '<input class="qty-num" id="qtyInput" type="number" value="1" min="1" max="' + maxQty + '" readonly>' +
            '<button class="qty-btn-large" id="qtyInc">+</button>' +
          '</div>' +
        '</div>' +
        '<button class="add-cart-large fade-up" id="addToCartBtn"><span id="addToCartText">Add to Cart</span></button>'
      : '<button class="add-cart-large" disabled style="opacity:0.5;cursor:not-allowed"><span>Out of Stock</span></button>';

    const content =
      breadcrumb +
      '<div class="product-detail">' +
        '<div class="product-image-area fade-in">' +
          '<div class="product-visual">' +
            '<div class="product-big-icon">' + (p.icon || '🔮') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="product-info">' +
          '<a href="/shop?category=' + p.category_slug + '" class="product-cat-tag">' + (p.category_name || 'Collection') + '</a>' +
          '<h1 class="product-title fade-up">' + p.name + '</h1>' +
          '<div class="product-rating-row fade-up">' +
            '<span class="stars">' + renderStars(p.avg_rating || 0) + '</span>' +
            '<span class="rating-count">' + (p.avg_rating ? p.avg_rating.toFixed(1) : '0.0') + ' (' + (p.review_count || 0) + ' review' + (p.review_count !== 1 ? 's' : '') + ')</span>' +
          '</div>' +
          '<div class="product-price-row fade-up">' +
            '<span class="product-current-price">' + formatPrice(p.price) + '</span>' +
            (p.compare_at_price ? '<span class="product-compare-price">' + formatPrice(p.compare_at_price) + '</span>' : '') +
            (discountPct > 0 ? '<span class="discount-badge">' + discountPct + '% off</span>' : '') +
          '</div>' +
          (p.short_description ? '<p class="product-short-desc fade-up">' + p.short_description + '</p>' : '') +
          '<div class="stock-indicator ' + stockClass + ' fade-up" style="margin-bottom:24px">' +
            '<span class="stock-dot"></span><span>' + stockLabel + '</span>' +
          '</div>' +
          qtyHTML +
          specsHTML +
          tagsHTML +
        '</div>' +
      '</div>' +
      (p.description
        ? '<div class="full-desc fade-up"><div class="section-divider"></div><h3>About This Piece</h3><p>' +
          p.description.replace(/\n/g, '</p><p>') +
          '</p></div>'
        : '') +
      '<div class="reviews-section">' +
        '<div class="section-divider"></div>' +
        '<h3>Reviews (' + (p.review_count || 0) + ')</h3>' +
        '<div id="reviewsList">' + reviewsHTML + '</div>' +
        '<div class="write-review">' +
          '<h4 id="writeReviewToggle">Write a Review <span style="font-size:0.8rem;color:var(--gold)">+</span></h4>' +
          '<div id="reviewForm" style="display:none">' +
            '<div class="star-picker" id="starPicker">' +
              [1,2,3,4,5].map(function(n) { return '<span class="star-pick" data-val="' + n + '">\u2605</span>'; }).join('') +
            '</div>' +
            '<div class="form-row">' +
              '<div class="form-group"><label>Your Name</label><input type="text" id="reviewName" placeholder="Name"></div>' +
              '<div class="form-group"><label>Email</label><input type="email" id="reviewEmail" placeholder="email@example.com"></div>' +
            '</div>' +
            '<div class="form-group"><label>Your Review</label><textarea id="reviewText" rows="4" placeholder="Share your experience\u2026"></textarea></div>' +
            '<button class="btn-primary" id="submitReviewBtn">Submit Review</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="related-section" id="relatedSection"></div>';

    document.getElementById('productSkeleton').style.display = 'none';
    document.getElementById('productContent').style.display = 'block';
    document.getElementById('productContent').innerHTML = content;

    if (window._reobserveAnimations) window._reobserveAnimations();

    // Qty controls
    document.getElementById('qtyDec') && document.getElementById('qtyDec').addEventListener('click', function() {
      const inp = document.getElementById('qtyInput');
      selectedQty = Math.max(1, parseInt(inp.value) - 1);
      inp.value = selectedQty;
    });
    document.getElementById('qtyInc') && document.getElementById('qtyInc').addEventListener('click', function() {
      const inp = document.getElementById('qtyInput');
      selectedQty = Math.min(maxQty, parseInt(inp.value) + 1);
      inp.value = selectedQty;
    });

    // Add to cart
    document.getElementById('addToCartBtn') && document.getElementById('addToCartBtn').addEventListener('click', function() {
      for (let i = 0; i < selectedQty; i++) {
        Cart.addToCart({ slug: p.slug, name: p.name, price: p.price, compare_at_price: p.compare_at_price, icon: p.icon || '🔮', category: p.category_name });
      }
      const btn = document.getElementById('addToCartBtn');
      const text = document.getElementById('addToCartText');
      btn.classList.add('success');
      text.textContent = '\u2713 Added to Cart';
      showToast(p.name, selectedQty + ' item' + (selectedQty > 1 ? 's' : '') + ' added to cart.');
      setTimeout(function() { btn.classList.remove('success'); text.textContent = 'Add to Cart'; }, 2500);
    });

    // Write review toggle
    document.getElementById('writeReviewToggle').addEventListener('click', function() {
      const form = document.getElementById('reviewForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });

    // Star picker
    document.querySelectorAll('.star-pick').forEach(function(star) {
      star.addEventListener('click', function() {
        selectedRating = parseInt(star.dataset.val);
        document.querySelectorAll('.star-pick').forEach(function(s, i) { s.classList.toggle('active', i < selectedRating); });
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(star.dataset.val);
        document.querySelectorAll('.star-pick').forEach(function(s, i) { s.classList.toggle('active', i < val); });
      });
    });
    document.getElementById('starPicker') && document.getElementById('starPicker').addEventListener('mouseleave', function() {
      document.querySelectorAll('.star-pick').forEach(function(s, i) { s.classList.toggle('active', i < selectedRating); });
    });

    // Submit review
    document.getElementById('submitReviewBtn').addEventListener('click', submitReview);

    // Load related
    loadRelated(p.category_slug, p.slug);

  } catch(e) {
    document.getElementById('productSkeleton').style.display = 'none';
    document.getElementById('productContent').style.display = 'block';
    document.getElementById('productContent').innerHTML = '<div style="text-align:center;padding:80px 40px"><p style="color:var(--muted)">Could not load product.</p><a href="/shop" class="btn-primary" style="margin-top:24px;display:inline-block">Back to Shop</a></div>';
  }
}

async function submitReview() {
  const name = document.getElementById('reviewName').value.trim();
  const email = document.getElementById('reviewEmail').value.trim();
  const text = document.getElementById('reviewText').value.trim();
  if (!name || !email || !text || !selectedRating) {
    showToast('Missing Info', 'Please fill all fields and select a rating.', 'error');
    return;
  }
  const btn = document.getElementById('submitReviewBtn');
  btn.disabled = true; btn.textContent = 'Submitting\u2026';
  try {
    const res = await fetch('/api/reviews', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_slug: slug, reviewer_name: name, reviewer_email: email, rating: selectedRating, review_text: text })
    });
    const data = await res.json();
    if (data.success) {
      showToast('Thank you!', 'Your review has been submitted for approval.');
      document.getElementById('reviewForm').style.display = 'none';
      document.getElementById('reviewName').value = '';
      document.getElementById('reviewEmail').value = '';
      document.getElementById('reviewText').value = '';
      selectedRating = 0;
      document.querySelectorAll('.star-pick').forEach(function(s) { s.classList.remove('active'); });
    } else {
      showToast('Error', data.error || 'Could not submit review.', 'error');
    }
  } catch(e) { showToast('Error', 'Network error.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Submit Review'; }
}

async function loadRelated(categorySlug, currentSlug) {
  if (!categorySlug) return;
  try {
    const res = await fetch('/api/products?category=' + categorySlug + '&limit=4');
    const data = await res.json();
    const related = (data.data || []).filter(function(p) { return p.slug !== currentSlug; }).slice(0, 4);
    if (!related.length) return;
    const section = document.getElementById('relatedSection');
    if (!section) return;

    // Build cards using DOM methods to avoid XSS from server-returned strings
    const divider = document.createElement('div');
    divider.className = 'section-divider';

    const heading = document.createElement('h3');
    heading.textContent = 'You May Also Like';

    const grid = document.createElement('div');
    grid.className = 'products-grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fill,minmax(240px,1fr))';

    related.forEach(function(p, i) {
      const card = document.createElement('div');
      card.className = 'product-card fade-up';
      card.style.transitionDelay = (i * 0.1) + 's';

      const iconEl = document.createElement('span');
      iconEl.className = 'product-icon';
      iconEl.textContent = p.icon || '🔮';

      const catEl = document.createElement('div');
      catEl.className = 'product-category';
      catEl.textContent = p.category_name || '';

      const nameEl = document.createElement('h3');
      nameEl.className = 'product-name';
      nameEl.textContent = p.name;

      const priceEl = document.createElement('div');
      priceEl.className = 'product-price';
      priceEl.textContent = formatPrice(p.price);

      const btn = document.createElement('button');
      btn.className = 'add-to-cart-btn';
      btn.dataset.slug = p.slug;
      btn.dataset.name = p.name;
      btn.dataset.price = p.price;
      btn.dataset.icon = p.icon || '🔮';
      btn.dataset.category = p.category_name || '';
      const btnSpan = document.createElement('span');
      btnSpan.textContent = 'Add to Cart';
      btn.appendChild(btnSpan);
      btn.addEventListener('click', function() {
        Cart.addToCart({
          slug: btn.dataset.slug,
          name: btn.dataset.name,
          price: parseFloat(btn.dataset.price),
          icon: btn.dataset.icon,
          category: btn.dataset.category
        });
        showToast(btn.dataset.name, 'Added to cart.');
        btnSpan.textContent = '\u2713 Added';
        btn.classList.add('added');
        setTimeout(function() { btnSpan.textContent = 'Add to Cart'; btn.classList.remove('added'); }, 2000);
      });

      const link = document.createElement('a');
      link.href = '/product?slug=' + encodeURIComponent(p.slug);
      link.style.cssText = 'display:block;text-align:center;margin-top:12px;font-size:0.72rem;color:var(--muted);text-decoration:none';
      link.textContent = 'View Details \u2192';

      card.appendChild(iconEl);
      card.appendChild(catEl);
      card.appendChild(nameEl);
      card.appendChild(priceEl);
      card.appendChild(btn);
      card.appendChild(link);
      grid.appendChild(card);
    });

    section.innerHTML = '';
    section.appendChild(divider);
    section.appendChild(heading);
    section.appendChild(grid);

    if (window._reobserveAnimations) window._reobserveAnimations();
  } catch(e) {}
}

loadProduct();
</script>
</body>
</html>
